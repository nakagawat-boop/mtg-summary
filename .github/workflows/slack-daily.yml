name: Daily Slack Summary

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  post-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and post to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 - << 'PYEOF'
          import json, os, urllib.request, datetime

          def fetch(url):
              with urllib.request.urlopen(url) as r:
                  return json.loads(r.read())

          sc = fetch("https://mtg-summary.vercel.app/api/sc-history")
          cs = fetch("https://mtg-summary.vercel.app/api/cs-history")

          SC_NAMES = ["清野","茨木","菊地","福田","大西","南原"]
          CS_NAMES = ["中村","大城","小谷","喜多"]

          sc_latest = sc.get("rows", [{}])[0].get("ca", []) if sc.get("rows") else []
          cs_latest = cs.get("rows", [{}])[0].get("ca", []) if cs.get("rows") else []

          def total(rows, key):
              return sum(r.get(key, 0) for r in rows)

          today = datetime.date.today().strftime("%Y/%m/%d")

          lines = [
              f"📊 *営業週次サマリー｜{today}*",
              "",
              "*【全体 SC＋CS】*",
              f"✅ 決定数: *{total(sc_latest,'decided')+total(cs_latest,'decided')}件* (SC {total(sc_latest,'decided')} / CS {total(cs_latest,'decided')})",
              f"💰 売上:   *{total(sc_latest,'sales')+total(cs_latest,'sales')}万* (SC {total(sc_latest,'sales')} / CS {total(cs_latest,'sales')})",
              f"👥 面談数: *{total(sc_latest,'meetings')+total(cs_latest,'meetings')}件* (SC {total(sc_latest,'meetings')} / CS {total(cs_latest,'meetings')})",
              f"⚡ 稼働数: *{total(sc_latest,'active')+total(cs_latest,'active')}名* (SC {total(sc_latest,'active')} / CS {total(cs_latest,'active')})",
              f"🎯 ズバ確定: *{total(sc_latest,'zuba')+total(cs_latest,'zuba')}万*",
              f"📈 CL見込み: *{total(sc_latest,'cl')+total(cs_latest,'cl')}万* (SC {total(sc_latest,'cl')} / CS {total(cs_latest,'cl')})",
              "",
              "*【SC CA別】*",
          ]
          for name, ca in zip(SC_NAMES, sc_latest):
              lines.append(f"  {name}: 決定{ca.get('decided',0)} 売上{ca.get('sales',0)}万 面談{ca.get('meetings',0)} 稼働{ca.get('active',0)}")
          lines += ["", "*【CS CA別】*"]
          for name, ca in zip(CS_NAMES, cs_latest):
              lines.append(f"  {name}: 決定{ca.get('decided',0)} 売上{ca.get('sales',0)}万 面談{ca.get('meetings',0)} 稼働{ca.get('active',0)}")

          payload = json.dumps({"text": "\n".join(lines), "username": "月次進捗レポート", "icon_emoji": ":mega:"}).encode("utf-8")
          req = urllib.request.Request(os.environ["SLACK_WEBHOOK"], data=payload, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          print("Slack送信完了")
          PYEOF
